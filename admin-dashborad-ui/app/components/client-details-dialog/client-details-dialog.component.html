<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[9990]" (click)="closeDialog()">
  <div class="bg-white rounded-lg shadow-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto z-[9991]" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="border-b px-6 py-4 flex items-center justify-between">
      <div>
        <h2 class="text-lg font-semibold flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          {{ client?.companyName }}
        </h2>
        <p class="text-sm text-gray-600 mt-1">Complete client information</p>
      </div>
      <button (click)="closeDialog()" class="text-gray-500 hover:text-gray-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="px-6 py-6 space-y-6">
      <!-- Status -->
      <div>
        <p class="text-sm text-gray-600 mb-1">Status</p>
        <span [ngClass]="getStatusBadgeClass()">{{ client?.status }}</span>
      </div>

      <!-- Contact Information -->
      <div class="space-y-3">
        <h3 class="font-semibold text-gray-900">Contact Information</h3>
        <div class="grid gap-3">
          <!-- Contact Person -->
          <div class="flex items-start gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <div>
              <p class="text-sm text-gray-600">Contact Person</p>
              <p>{{ client?.contactPerson }}</p>
            </div>
          </div>

          <!-- Email -->
          <div class="flex items-start gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"></rect>
              <path d="m22 7-10 5L2 7"></path>
            </svg>
            <div>
              <p class="text-sm text-gray-600">Email</p>
              <p class="break-all">{{ client?.email }}</p>
            </div>
          </div>

          <!-- Phone -->
          <div class="flex items-start gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
            <div>
              <p class="text-sm text-gray-600">Contact Number</p>
              <p>{{ client?.contactNumber }}</p>
            </div>
          </div>

          <!-- Address -->
          <div *ngIf="client?.address" class="flex items-start gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <div>
              <p class="text-sm text-gray-600">Address</p>
              <p>{{ client?.address }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
