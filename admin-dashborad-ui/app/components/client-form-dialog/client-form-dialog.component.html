<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[9990]" (click)="closeDialog()">
  <div 
    class="bg-white rounded-xl shadow-2xl overflow-hidden w-full max-w-2xl max-h-[90vh] overflow-y-auto animate-slideInDown z-[9991]"
    (click)="$event.stopPropagation()"
  >
    <!-- Dialog Header -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-8 py-6 flex items-center justify-between">
      <div class="text-white flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
        <h2 class="text-2xl font-bold">Add New Client</h2>
      </div>
      <button 
        (click)="closeDialog()" 
        class="text-white hover:bg-white/20 p-2 rounded-lg transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Dialog Body -->
    <div class="px-8 py-8 space-y-6">
      <!-- Company Name -->
      <div class="space-y-2">
        <label for="company" class="block text-sm font-bold text-gray-700 uppercase tracking-wide">
          Company Name <span class="text-red-500">*</span>
        </label>
        <input
          id="company"
          type="text"
          [(ngModel)]="formData.companyName"
          placeholder="Enter company name"
          class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all duration-200 font-medium"
        />
      </div>

      <!-- Email and Contact Person Row -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <label for="email" class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="formData.email"
            placeholder="company@example.com"
            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all duration-200 font-medium"
          />
        </div>

        <div class="space-y-2">
          <label for="contactPerson" class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Contact Person</label>
          <input
            id="contactPerson"
            type="text"
            [(ngModel)]="formData.contactPerson"
            placeholder="Full name"
            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all duration-200 font-medium"
          />
        </div>
      </div>

      <!-- Contact Number -->
      <div class="space-y-2">
        <label for="phone" class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Contact Number</label>
        <input
          id="phone"
          type="tel"
          [(ngModel)]="formData.contactNumber"
          placeholder="+1 (555) 123-4567"
          class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all duration-200 font-medium"
        />
      </div>

      <!-- Address -->
      <div class="space-y-2">
        <label for="address" class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Address</label>
        <textarea
          id="address"
          [(ngModel)]="formData.address"
          placeholder="Street, City, State, ZIP"
          rows="2"
          class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all duration-200 font-medium resize-none"
        ></textarea>
      </div>
    </div>

    <!-- Dialog Footer -->
    <div class="bg-gray-50 px-8 py-6 flex items-center justify-end gap-4 border-t border-gray-200">
      <button
        (click)="closeDialog()"
        class="px-6 py-3 border-2 border-gray-300 text-gray-700 font-bold rounded-lg hover:bg-gray-100 transition-all duration-300"
      >
        Cancel
      </button>
      <button
        (click)="handleSubmit()"
        class="px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-bold rounded-lg hover:shadow-lg hover:from-blue-700 hover:to-blue-800 transition-all duration-300 flex items-center gap-2"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        Create Client
      </button>
    </div>
  </div>
</div>
