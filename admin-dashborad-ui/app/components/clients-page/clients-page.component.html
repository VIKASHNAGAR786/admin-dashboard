<!-- Sidebar -->
<app-sidebar [isOpen]="sidebarOpen" (toggleSidebar)="handleToggleSidebar()"></app-sidebar>

<!-- Main Layout -->
<div class="main-layout" [class.sidebar-open]="sidebarOpen">
  <!-- Header with Gradient -->
  <div class="bg-gradient-to-r from-blue-600 via-blue-500 to-blue-700 shadow-lg relative overflow-hidden">
    <div class="absolute inset-0 opacity-20">
      <svg class="w-full h-full" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M0,50 Q300,0 600,50 T1200,50 L1200,120 L0,120 Z" fill="currentColor"></path>
      </svg>
    </div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 relative z-10">
      <div class="flex items-center justify-between">
        <div class="text-white">
          <div class="flex items-center gap-3 mb-2">
            <div class="p-2 bg-white bg-opacity-20 rounded-lg backdrop-blur">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
            </div>
            <h1 class="text-3xl font-bold">Client Management</h1>
          </div>
          <p class="text-blue-100">Manage all your clients in one place</p>
        </div>
        <button
          (click)="handleLogout()"
          class="flex items-center gap-2 bg-white text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-lg text-sm font-bold transition-all duration-300 shadow-md hover:shadow-lg transform hover:scale-105"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <app-clients-table 
      [clients]="clients"
      [generatedKeys]="generatedKeys"
      (onCreateClient)="handleCreateClient($event)">
    </app-clients-table>
  </div>
</div>

<!-- Alert Notification -->
<app-alert-notification></app-alert-notification>
