<div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
  <!-- Table Header -->
  <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-8 py-6 flex items-center justify-between">
    <h3 class="text-xl font-bold text-white flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 3H5a2 2 0 0 0-2 2v4m0 0a9 9 0 0 0 18 0m0 0V5a2 2 0 0 0-2-2h-4m0 0a9 9 0 0 1-18 0"></path>
      </svg>
      Client Management
    </h3>
    <button 
      (click)="openFormDialog()"
      class="flex items-center gap-2 bg-white text-blue-600 hover:bg-blue-50 px-6 py-2 rounded-lg text-sm font-bold transition-all duration-300 shadow-md hover:shadow-lg transform hover:scale-105"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Add Client
    </button>
  </div>

  <!-- Table Container -->
  <div class="overflow-x-auto">
    <table class="w-full">
      <!-- Enhanced Table Head -->
      <thead class="bg-gradient-to-r from-gray-50 to-gray-100 border-b-2 border-gray-200">
        <tr>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Company</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Email</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Contact Person</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Phone</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Status</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>

      <!-- Enhanced Table Body -->
      <tbody>
        <tr 
          *ngFor="let client of clients; let last = last" 
          [class.border-b]="!last"
          class="hover:bg-blue-50 transition-colors duration-200 group border-b border-gray-200">
          
          <!-- Company Name -->
          <td class="px-6 py-4">
            <div class="font-semibold text-gray-900">{{ client.companyName }}</div>
            <div class="text-xs text-gray-500 mt-1">ID: {{ client.id }}</div>
          </td>

          <!-- Email -->
          <td class="px-6 py-4">
            <div class="text-sm text-gray-700">{{ client.email }}</div>
          </td>

          <!-- Contact Person -->
          <td class="px-6 py-4">
            <div class="text-sm text-gray-700">{{ client.contactPerson }}</div>
          </td>

          <!-- Phone -->
          <td class="px-6 py-4">
            <div class="text-sm text-gray-700">{{ client.contactNumber }}</div>
          </td>

          <!-- Status -->
          <td class="px-6 py-4">
            <span [ngClass]="getStatusBadgeClass(client.status)" class="inline-block px-3 py-1 rounded-lg text-xs font-bold">
              {{ client.status }}
            </span>
          </td>

          <!-- Actions -->
          <td class="px-6 py-4 flex items-center gap-2">
            <!-- Copy Access Key Button -->
            <button 
              *ngIf="getActiveAccessKey(client.id)"
              (click)="copyAccessKey(client.id, $event)" 
              class="p-2 rounded-lg hover:bg-emerald-100 transition-colors duration-200 text-emerald-600 hover:text-emerald-700 opacity-0 group-hover:opacity-100"
              [title]="copiedKeyId === client.id ? 'Copied!' : 'Copy API Key'">
              <svg *ngIf="copiedKeyId !== client.id" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              <svg *ngIf="copiedKeyId === client.id" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </button>
            
            <!-- View Details Button -->
            <button 
              (click)="openDialog(client)" 
              class="p-2 rounded-lg hover:bg-blue-100 transition-colors duration-200 text-blue-600 hover:text-blue-700 opacity-0 group-hover:opacity-100">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </td>
        </tr>

        <!-- Empty State -->
        <tr *ngIf="!clients || clients.length === 0">
          <td colspan="6" class="px-6 py-12 text-center">
            <div class="flex flex-col items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-400 mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4"></path>
                <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"></path>
              </svg>
              <p class="text-gray-500 font-medium">No clients found</p>
              <p class="text-gray-400 text-sm">Create a new client to get started</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Client Details Dialog -->
<app-client-details-dialog 
  [client]="selectedClient" 
  [isOpen]="isDialogOpen"
  (closeEvent)="closeDialog()">
</app-client-details-dialog>

<!-- Client Form Dialog -->
<app-client-form-dialog 
  [isOpen]="isFormDialogOpen"
  (closeEvent)="closeFormDialog()"
  (submitEvent)="handleCreateClient($event)">
</app-client-form-dialog>
