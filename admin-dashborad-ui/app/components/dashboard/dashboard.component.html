<!-- Sidebar -->
<app-sidebar [isOpen]="sidebarOpen" (toggleSidebar)="handleToggleSidebar()"></app-sidebar>

<!-- Main Layout -->
<div class="main-layout" [class.sidebar-open]="sidebarOpen">
  <!-- Premium Header with Advanced Gradient & Animation -->
  <div class="relative bg-gradient-to-br from-blue-600 via-indigo-700 to-purple-800 shadow-2xl overflow-hidden">
    <!-- Animated mesh background -->
    <div class="absolute inset-0 opacity-20">
      <div class="absolute top-0 left-0 w-96 h-96 bg-purple-400 rounded-full mix-blend-overlay filter blur-3xl animate-blob"></div>
      <div class="absolute top-0 right-0 w-96 h-96 bg-blue-400 rounded-full mix-blend-overlay filter blur-3xl animate-blob animation-delay-2000"></div>
      <div class="absolute bottom-0 left-1/2 w-96 h-96 bg-indigo-400 rounded-full mix-blend-overlay filter blur-3xl animate-blob animation-delay-4000"></div>
    </div>
    
    <!-- Wave pattern -->
    <div class="absolute inset-0 opacity-10">
      <svg class="w-full h-full" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <defs>
          <linearGradient id="wave-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#fff;stop-opacity:0.5" />
            <stop offset="100%" style="stop-color:#fff;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path d="M0,50 Q300,0 600,50 T1200,50 L1200,120 L0,120 Z" fill="url(#wave-gradient)"></path>
      </svg>
    </div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
      <div class="flex items-center justify-between">
        <div class="text-white space-y-3">
          <div class="flex items-center gap-4">
            <div class="relative">
              <div class="absolute inset-0 bg-white opacity-20 rounded-2xl blur-md animate-pulse"></div>
              <div class="relative p-3 bg-gradient-to-br from-white/30 to-white/10 backdrop-blur-sm rounded-2xl border border-white/30 shadow-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
              </div>
            </div>
            <div>
              <h1 class="text-4xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-blue-100">API Key Generator</h1>
              <div class="flex items-center gap-3 mt-2">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-emerald-500/90 text-white shadow-lg">
                  <span class="w-2 h-2 bg-white rounded-full mr-2 animate-pulse"></span>
                  System Online
                </span>
                <p class="text-blue-100 text-sm font-medium">Secure key generation & management platform</p>
              </div>
            </div>
          </div>
        </div>
        <button
          (click)="handleLogout()"
          class="group flex items-center gap-3 bg-white/95 backdrop-blur-sm text-indigo-700 hover:bg-white px-6 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 shadow-xl hover:shadow-2xl transform hover:scale-105 border border-white/50"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:translate-x-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content with Premium Background -->
  <div class="min-h-screen bg-gradient-to-br from-gray-50 via-blue-50/30 to-indigo-50/40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <!-- Stats Section -->
      <app-dashboard-stats [clients]="clients" [generatedKeys]="generatedKeys" [apiStats]="stats"></app-dashboard-stats>

      <!-- Key Generator Section -->
      <div class="mt-8">
        <app-key-generator
          [generatedKeys]="generatedKeys"
          [clients]="clients"
          (onGenerateKey)="handleGenerateKey($event)"
        ></app-key-generator>
      </div>
    </div>
  </div>
</div>
