<!-- Header with Gradient -->
<div class="bg-gradient-to-r from-blue-600 via-blue-500 to-blue-700 shadow-lg relative overflow-hidden">
  <div class="absolute inset-0 opacity-20">
    <svg class="w-full h-full" viewBox="0 0 1200 120" preserveAspectRatio="none">
      <path d="M0,50 Q300,0 600,50 T1200,50 L1200,120 L0,120 Z" fill="currentColor"></path>
    </svg>
  </div>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 relative z-10">
    <div class="flex items-center justify-between">
      <div class="text-white">
        <div class="flex items-center gap-3 mb-2">
          <div class="p-2 bg-white bg-opacity-20 rounded-lg backdrop-blur">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor">
              <path d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <h1 class="text-3xl font-bold">Admin Dashboard</h1>
        </div>
        <p class="text-blue-100">Manage clients, plans, and security keys with ease</p>
      </div>
      <button
        (click)="handleLogout()"
        class="flex items-center gap-2 bg-white text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-lg text-sm font-bold transition-all duration-300 shadow-md hover:shadow-lg transform hover:scale-105"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Logout
      </button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- Stats Section -->
  <app-dashboard-stats [clients]="clients"></app-dashboard-stats>

  <!-- Tabs Section -->
  <div class="mt-8">
    <!-- Tab Buttons -->
    <div class="flex gap-2 border-b border-gray-200 bg-white rounded-t-lg px-6">
      <button
        (click)="activeTab = 'clients'"
        [ngClass]="{
          'border-b-4 border-blue-600 text-blue-600 bg-blue-50': activeTab === 'clients',
          'text-gray-600 hover:text-gray-900 hover:bg-gray-50': activeTab !== 'clients'
        }"
        class="px-6 py-4 flex items-center gap-3 transition-all duration-300 font-medium rounded-t-lg"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span>Clients Management</span>
      </button>
      <button
        (click)="activeTab = 'keys'"
        [ngClass]="{
          'border-b-4 border-blue-600 text-blue-600 bg-blue-50': activeTab === 'keys',
          'text-gray-600 hover:text-gray-900 hover:bg-gray-50': activeTab !== 'keys'
        }"
        class="px-6 py-4 flex items-center gap-3 transition-all duration-300 font-medium rounded-t-lg"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 2H3C1.9 2 1 2.9 1 4v16c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 18H3V4h18v16zm-9.5-1.5h3v1.5h-3zm3-3h-6v2h6zm-5-1h9V7h-9z"></path>
        </svg>
        <span>Key Generator</span>
      </button>
    </div>

    <!-- Tab Content with Animation -->
    <div class="mt-6 animate-fadeIn">
      <div *ngIf="activeTab === 'clients'" class="animate-slideInDown">
        <app-clients-table [clients]="clients"></app-clients-table>
      </div>
      <div *ngIf="activeTab === 'keys'" class="animate-slideInDown">
        <app-key-generator
          [generatedKeys]="generatedKeys"
          (onGenerateKey)="handleGenerateKey($event)"
        ></app-key-generator>
      </div>
    </div>
  </div>
</div>
