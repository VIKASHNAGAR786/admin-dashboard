<div class="min-h-screen bg-gradient-to-br from-cyan-300 via-blue-400 to-purple-500 flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Floating Background Elements -->
  <div class="absolute top-10 left-10 w-32 h-32 bg-white rounded-full opacity-20 animate-bounce" style="animation-duration: 3s;"></div>
  <div class="absolute bottom-20 right-10 w-40 h-40 bg-white rounded-full opacity-15 animate-bounce" style="animation-duration: 4s;"></div>
  <div class="absolute top-1/4 right-1/4 w-24 h-24 bg-white rounded-full opacity-20 animate-bounce" style="animation-duration: 2s;"></div>

  <div class="w-full max-w-4xl bg-white rounded-2xl shadow-2xl relative z-10 overflow-hidden">
    <!-- Animated Top Strip -->
    <div class="h-2 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 animate-gradient-shift"></div>

    <!-- Card Content with Character -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 p-8">
      <!-- Animated Character Section -->
      <div class="flex flex-col items-center justify-center hidden lg:flex">
        <!-- Admin Guard Character -->
        <div class="relative h-80 w-full flex items-center justify-center">
          <svg class="w-64 h-64" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
            <!-- Hat -->
            <rect x="60" y="20" width="80" height="15" rx="3" fill="#2D5A8C" class="character-bounce" style="animation: characterBounce 2s ease-in-out infinite;"/>
            <polygon points="60,20 55,15 145,15 140,20" fill="#1E3A5F" />
            
            <!-- Head -->
            <circle cx="100" cy="60" r="30" fill="#F4A460" />
            
            <!-- Eyes -->
            <circle cx="90" cy="50" r="4" fill="#000"/>
            <circle cx="110" cy="50" r="4" fill="#000"/>
            
            <!-- Confident Smile -->
            <path d="M 90 65 Q 100 73 110 65" stroke="#000" stroke-width="2" fill="none"/>
            
            <!-- Body (Guard Suit) -->
            <rect x="70" y="92" width="60" height="60" rx="5" fill="#2D5A8C" stroke="#1E3A5F" stroke-width="2" />
            
            <!-- Badge -->
            <circle cx="100" cy="110" r="12" fill="#FFD700" stroke="#DAA520" stroke-width="2" />
            <text x="100" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D5A8C">★</text>
            
            <!-- Left Arm (welcoming) -->
            <g>
              <line x1="70" y1="105" x2="35" y2="95" stroke="#F4A460" stroke-width="8" stroke-linecap="round" class="wave-arm"/>
              <circle cx="30" cy="92" r="8" fill="#F4A460" />
            </g>
            
            <!-- Right Arm -->
            <g>
              <line x1="130" y1="105" x2="165" y2="95" stroke="#F4A460" stroke-width="8" stroke-linecap="round" />
              <circle cx="170" cy="92" r="8" fill="#F4A460" />
            </g>
            
            <!-- Legs -->
            <line x1="85" y1="152" x2="80" y2="200" stroke="#1E3A5F" stroke-width="8" stroke-linecap="round" />
            <line x1="115" y1="152" x2="120" y2="200" stroke="#1E3A5F" stroke-width="8" stroke-linecap="round" />
            
            <!-- Shoes -->
            <circle cx="80" cy="205" r="8" fill="#000" />
            <circle cx="120" cy="205" r="8" fill="#000" />
            
            <!-- Security Shield Badge -->
            <g class="shield-glow" style="animation: shieldPulse 2s ease-in-out infinite;">
              <path d="M 100 20 L 95 30 L 95 40 Q 100 45 105 40 L 105 30 Z" fill="#FFD700" opacity="0.6" />
            </g>
          </svg>
        </div>
        
        <!-- Welcome Text -->
        <div class="text-center mt-4">
          <p class="text-sm font-semibold text-gray-600 animate-fade-in">Secure Access Portal</p>
          <div class="flex justify-center gap-2 mt-2">
            <span class="text-2xl animate-pulse">🔐</span>
            <span class="text-2xl animate-pulse" style="animation-delay: 0.2s;">✨</span>
            <span class="text-2xl animate-pulse" style="animation-delay: 0.4s;">🔐</span>
          </div>
        </div>
      </div>

      <!-- Login Form Section -->
      <div>
        <!-- Card Header -->
        <div class="space-y-3 mb-6">
          <h1 class="text-3xl lg:text-4xl font-bold text-gray-900">Admin Login</h1>
          <p class="text-gray-600 text-sm">Enter your credentials to access the secure dashboard</p>
          <div class="h-1 w-16 bg-gradient-to-r from-blue-500 to-purple-500 rounded"></div>
        </div>

        <!-- Form Content -->
        <form (ngSubmit)="handleLogin($event)" class="space-y-4">
          <!-- Username Field -->
          <div class="space-y-2">
            <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
            <input
              id="username"
              type="text"
              [(ngModel)]="username"
              name="username"
              placeholder="admin"
              required
              autocomplete="username"
              class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all duration-200 hover:border-blue-300"
            />
          </div>

          <!-- Password Field -->
          <div class="space-y-2">
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <div class="relative">
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                [(ngModel)]="password"
                name="password"
                placeholder="Enter password"
                required
                autocomplete="current-password"
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all duration-200 hover:border-blue-300"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 transition-colors"
              >
                <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <!-- Error Message -->
          <div *ngIf="error" class="bg-red-50 border-2 border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm font-medium animate-shake">
            ⚠️ {{ error }}
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            [disabled]="isLoading"
            class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 px-4 rounded-lg hover:shadow-lg hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 transform"
          >
            <span *ngIf="!isLoading" class="flex items-center justify-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Enter Secure Dashboard
            </span>
            <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Authenticating...
            </span>
          </button>

          <!-- Demo Credentials -->
          <div class="mt-4 p-4 bg-gradient-to-br from-blue-50 to-purple-50 rounded-lg border border-blue-200">
            <p class="text-xs text-gray-700 text-center font-semibold mb-2">🔓 Demo Credentials</p>
            <div class="grid grid-cols-2 gap-2 text-xs">
              <div>
                <p class="text-gray-600">Username:</p>
                <code class="bg-white px-2 py-1 rounded border border-blue-200 block text-center font-mono font-bold text-blue-600">admin</code>
              </div>
              <div>
                <p class="text-gray-600">Password:</p>
                <code class="bg-white px-2 py-1 rounded border border-blue-200 block text-center font-mono font-bold text-blue-600">admin123</code>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- CSS Animations -->
  <style>
    @keyframes characterBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes shieldPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    @keyframes waveArm {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(25deg); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .animate-fade-in {
      animation: fadeIn 1s ease-out;
    }

    .animate-shake {
      animation: shake 0.5s ease-in-out;
    }

    .character-bounce {
      animation: characterBounce 2s ease-in-out infinite;
    }

    .wave-arm {
      animation: waveArm 1s ease-in-out infinite;
      transform-origin: 70px 105px;
    }

    .shield-glow {
      animation: shieldPulse 2s ease-in-out infinite;
    }

    .animate-gradient-shift {
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
    }
  </style>
</div>
