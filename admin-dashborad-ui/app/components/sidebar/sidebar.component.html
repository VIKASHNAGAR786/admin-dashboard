<!-- Sidebar -->
<div class="sidebar-container" [class.open]="isOpen">
  <!-- Sidebar Background Overlay (Mobile) -->
  <div class="sidebar-overlay" (click)="onToggle()"></div>

  <!-- Sidebar Content -->
  <div class="sidebar-content">
    <!-- Sidebar Logo/Header -->
    <div class="sidebar-header">
      <div class="logo-container" *ngIf="isOpen">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor">
            <path d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="logo-text">Admin</span>
      </div>
      <div class="logo" *ngIf="!isOpen">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <button
        class="toggle-btn"
        (click)="onToggle(); $event.stopPropagation()"
        [title]="isOpen ? 'Collapse sidebar' : 'Expand sidebar'"
        [attr.aria-label]="isOpen ? 'Collapse sidebar' : 'Expand sidebar'"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <!-- Chevron right when closed, chevron left when open -->
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            [attr.d]="isOpen ? 'M15 19l-7-7 7-7' : 'M9 5l7 7-7 7'"
          />
        </svg>
      </button>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
      <div class="nav-item" (click)="navigateTo('/dashboard')">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="label">Dashboard</span>
      </div>

      <div class="nav-item" (click)="navigateTo('/clients')">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span class="label">Clients</span>
      </div>

      <div class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v4"></path>
        </svg>
        <span class="label">API Keys</span>
      </div>

      <div class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="19" cy="12" r="1"></circle>
          <circle cx="5" cy="12" r="1"></circle>
        </svg>
        <span class="label">More</span>
      </div>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <div class="footer-item">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <path d="M12 1v6m0 6v6"></path>
          <path d="M4.22 4.22l4.24 4.24m0 5.08l-4.24 4.24"></path>
          <path d="M1 12h6m6 0h6"></path>
          <path d="M4.22 19.78l4.24-4.24m5.08 0l4.24 4.24"></path>
          <path d="M12 17v6"></path>
          <path d="M19.78 19.78l-4.24-4.24m0-5.08l4.24-4.24"></path>
          <path d="M23 12h-6m-6 0H5"></path>
          <path d="M19.78 4.22l-4.24 4.24m-5.08 0l-4.24-4.24"></path>
        </svg>
        <span class="label">Settings</span>
      </div>
    </div>
  </div>
</div>
